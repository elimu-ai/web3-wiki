name: Drips💧 Project Splits - Hourly

on:
  schedule:
    - cron: 0 * * * *
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
        run:
            working-directory: project-splits

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: project-splits/package-lock.json

    - run: npm ci
    - run: npx tsc

    - name: Update Project Splits
      id: get_repo_name
      env:
        PINATA_JWT: ${{ secrets.PINATA_JWT }}
        PRIVATE_KEY_CONTENT: ${{ secrets.PRIVATE_KEY_CONTENT }}
        PRIVATE_KEY_ENGINEERING: ${{ secrets.PRIVATE_KEY_ENGINEERING }}
        PRIVATE_KEY_DISTRIBUTION: ${{ secrets.PRIVATE_KEY_DISTRIBUTION }}
      run: |
        REPO_NAME="$(node update-project-splits.js)"
        echo "REPO_NAME $REPO_NAME"
        echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

    - name: Git Config
      run: |
        git config user.name 'Nya Ξlimu'
        git config user.email 'info@elimu.ai'

    - name: Git Generate Short Diffstat
      run: |
        git --no-pager diff --shortstat
    
    - name: Git Commit
      if: steps.get_repo_name.outputs.repo_name != ''
      run: |
        git add *.json
        echo "repo_name: ${{ steps.get_repo_name.outputs.repo_name }}"
        git commit -m 'chore(drips💧): update ${{ steps.get_repo_name.outputs.repo_name }} project splits' -m '#66'

    - name: Git Push
      if: steps.get_repo_name.outputs.repo_name != ''
      run: |
        git push

    - name: Discord Notification on Failure
      if: failure() && github.ref == 'refs/heads/main' # Only notify if `main` branch fails
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d "{\"content\": \"❌ **Workflow Failed**\nJob: ${{ github.job }}\nWorkflow: ${{ github.workflow }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n<@&1466158362453348649>\"}" \
             ${{ secrets.DISCORD_WEBHOOK_URL }} 
